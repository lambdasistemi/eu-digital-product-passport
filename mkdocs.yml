site_name: EU Digital Product Passport on Cardano
site_description: Feasibility study — storing EU Digital Product Passports on Cardano
site_url: https://lambdasistemi.github.io/eu-digital-product-passport/
repo_url: https://github.com/lambdasistemi/eu-digital-product-passport
repo_name: lambdasistemi/eu-digital-product-passport

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: cyan
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Cardano Platform:
    - Overview: cardano/overview.md
    - On-Chain Storage: cardano/storage.md
    - Access Control: cardano/access-control.md
    - Identity: cardano/identity.md
    - Cost Analysis: cardano/costs.md
    - Scalability: cardano/scalability.md
    - EU Integration: cardano/eu-integration.md
    - Existing Work: cardano/existing-work.md
  - Batteries:
    - Overview: sectors/batteries/index.md
    - Architecture: sectors/batteries/architecture.md
    - Passport State: sectors/batteries/state.md
    - Lifecycle: sectors/batteries/lifecycle.md
    - Signed BMS Readings: sectors/batteries/signed-bms.md
    - NFC Hardware: sectors/batteries/nfc-hardware.md
    - Payload Standard: sectors/batteries/payload-standard.md
    - User Reporting & Incentives: sectors/batteries/incentives.md
    - Ownership Transfer: sectors/batteries/ownership.md
  - Tyres:
    - Overview: sectors/tyres/index.md
  - Textiles:
    - Overview: sectors/textiles/index.md
  - EU DPP Background:
    - Regulation: regulation.md
    - Timeline: timeline.md
    - Data Model: data-model.md
    - Schemas:
      - Battery Pass: schemas/battery-pass.md
      - UNTP DPP: schemas/untp-dpp.md
    - Examples:
      - Battery (Battery Pass): examples/battery-pass.md
      - Battery (UNTP): examples/untp-battery.md
    - Access & Governance: access.md
    - Pilots & Implementations: pilots.md
  - References: references.md
  - Links: links.md
